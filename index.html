<!doctype html>
<html lang="zh-Hant">
<head>

  <!-- SELA Favicon Set -->
  <link rel="icon" type="image/png" sizes="32x32" href="favicon/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="favicon/favicon-16x16.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="favicon/apple-touch-icon.png" />

  <meta name="theme-color" content="#3C6078" />

  <!-- Open Graph -->
  <meta property="og:title" content="台灣及世界地圖測驗 MapQuiz" />
  <meta property="og:description" content="邊玩邊記台灣縣市、鄉鎮市區與世界各國位置。" />
  <meta property="og:type" content="website" />

  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="wrap"><div id="app"></div></div>

  <!-- 資料與程式分檔；classic script（非 module）以支援本機 file:// 直接雙擊執行 -->
  <script src="js/data.js"></script>
  <script src="data/landmarks.js"></script>
  <script src="data/world.js"></script>
  <script src="data/world-landmarks.js"></script>
  <script src="data/world-facts.js"></script>
  <script src="data/taiwan-facts.js"></script>
  <script src="data/world-capitals.js"></script>
  <script src="data/world-flags.js"></script>
  <script src="js/app.js"></script>
  <script>
    // PWA：僅在 http(s) 下註冊（file:// 雙擊跳過，坑 P1 精神）；相對路徑支援 GitHub Pages 子路徑
    // 自動更新三件套：載入即 update()、回前景再 update()、新版接管自動 reload 一次
    if ("serviceWorker" in navigator && location.protocol.indexOf("http") === 0) {
      navigator.serviceWorker.register("./sw.js").then(function (reg) {
        var check = function () { reg.update().catch(function () {}); };
        check();
        document.addEventListener("visibilitychange", function () { if (!document.hidden) check(); });
      });
      var hadController = !!navigator.serviceWorker.controller;
      var reloaded = false;
      navigator.serviceWorker.addEventListener("controllerchange", function () {
        if (reloaded || !hadController) return; // 首次安裝不 reload，避免迴圈
        reloaded = true;
        location.reload();
      });
    }
  </script>
</body>
</html>
